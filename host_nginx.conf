# Writable paths relative to the nginx prefix (the bundled Nginx/ folder).
# Without an existing logs/ + temp/ dir nginx fails to start SILENTLY, which
# shows up downstream as the client getting WinError 10061 (nothing on :443).
# server_host_main.materialize_nginx_conf() rewrites every relative path below
# into an absolute, double-quoted path at runtime (Windows paths have spaces).
error_log  logs/error.log  warn;
pid        logs/nginx.pid;

events {
    worker_connections 256;
}

http {
    server_names_hash_bucket_size 64;
    proxy_set_header Host $host;

    client_body_temp_path temp/client_body_temp;
    proxy_temp_path        temp/proxy_temp;
    fastcgi_temp_path      temp/fastcgi_temp;
    uwsgi_temp_path        temp/uwsgi_temp;
    scgi_temp_path         temp/scgi_temp;
    access_log             logs/access.log;

    # Shop
    server {
        listen 443 ssl;
        server_name seawolf-shop.gog.com;
        ssl_certificate     conf/fake.crt;
        ssl_certificate_key conf/fake.key;
        location = /platforms/GOG/products {
            root html/shop;
            default_type application/json;
            add_header Cache-Control "no-cache, private";
        }
        location / { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }
    }

    # Rankings
    server {
        listen 443 ssl;
        server_name seawolf-rankings.gog.com;
        ssl_certificate     conf/fake.crt;
        ssl_certificate_key conf/fake.key;
        location / { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }
    }

    # Profile
    server {
        listen 443 ssl;
        server_name seawolf-profile.gog.com;
        ssl_certificate     conf/fake.crt;
        ssl_certificate_key conf/fake.key;
        location / { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }
    }

    # Remote config
    server {
        listen 443 ssl;
        server_name remote-config.gog.com;
        ssl_certificate     conf/fake.crt;
        ssl_certificate_key conf/fake.key;
        location / { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; proxy_set_header Host $host; }
    }

    # Rewards
    server {
        listen 443 ssl;
        server_name seawolf-rewards.gog.com;
        ssl_certificate     conf/fake.crt;
        ssl_certificate_key conf/fake.key;
        location / { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }
    }

    # Matchmaking
    server {
        listen 443 ssl;
        server_name seawolf-matchmaking.gog.com;
        ssl_certificate     conf/fake.crt;
        ssl_certificate_key conf/fake.key;
        location / { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }
    }

    # Games log
    server {
        listen 443 ssl;
        server_name seawolf-games-log.gog.com;
        ssl_certificate     conf/fake.crt;
        ssl_certificate_key conf/fake.key;
        location / { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }
    }

    # Auth
    server {
        listen 443 ssl;
        server_name auth.gog.com;
        ssl_certificate     conf/fake.crt;
        ssl_certificate_key conf/fake.key;
        location / { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }
    }

    # Users
    server {
        listen 443 ssl;
        server_name users.gog.com;
        ssl_certificate     conf/fake.crt;
        ssl_certificate_key conf/fake.key;
        location / { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }
    }

    # Config / Deck / Inventory (multi-domain block)
    server {
        listen 443 ssl;
        server_name seawolf-config.gog.com seawolf-deck.gog.com seawolf-inventory.gog.com;
        ssl_certificate     conf/fake.crt;
        ssl_certificate_key conf/fake.key;

        location ~* ^/users/[0-9]+/cards/public { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }
        location ~* ^/users/[0-9]+/public       { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }
        location ~* ^/users/[0-9]+/cards         { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }
        location ~* ^/users/[0-9]+/factions      { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }
        location ~* ^/user(s)?/[0-9]+/card_packs { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }
        location ~* ^/users/[0-9]+/decks         { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }
        location ~* ^/users/[0-9]+/currencies    { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }
        location ~* ^/users/[0-9]+/items         { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }
        location ~* ^/users/[0-9]+/transactions  { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }
        location ~* ^/transactions               { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }
        location ~* ^/debug                      { proxy_pass https://127.0.0.1:8443; proxy_ssl_verify off; }

        location ~* ^/users/ {
            add_header Content-Type application/json;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            return 200 '{"items":[],"total_count":0,"limit":100,"page_token":"","next_page_token":""}';
        }

        location /card_definitions/prices {
            alias html/card_definitions/prices;
            add_header Content-Type application/json;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location /item_definitions {
            add_header Content-Type application/json;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            return 200 '{"items":[{"id":1,"item_template":{"id":1,"name":"Card Keg","category":"CardPack","consumable":true},"parameters":{"chooseable_count":1,"non_chooseable_count":4,"chooseable_restrictions":{"rarity":2,"premium":false}}}],"total_count":1,"limit":100,"page_token":"","next_page_token":""}';
        }

        location / {
            root html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires -1;
            etag off;
            if_modified_since off;
            add_header Last-Modified "";
        }
    }
}
